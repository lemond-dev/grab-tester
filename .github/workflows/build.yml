name: Build GrabTester

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: GrabTester

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish single-file exe
        run: >
          dotnet publish GrabTester.csproj
          -r win-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -c Release
          -o ../dist/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: GrabTester
          path: dist/GrabTester.exe
